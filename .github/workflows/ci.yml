name: CI Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov flake8 pylint mypy mkdocs

    - name: Run flake8
      run: flake8 mkdocs_cdoc  
      
    - name: Run pylint
      run: pylint mkdocs_cdoc || true
      
    - name: Run tests
      run: pytest

    - name: Run coverage
      run: pytest --cov=mkdocs_cdoc

    - name: Build project
      run: mkdocs build -f mkdocs-site.yml
